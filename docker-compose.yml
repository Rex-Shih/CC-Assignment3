services:
  web:
    build: .
    container_name: todo-flask-app
    ports:
      - "5001:5000"
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: camp2016
      MONGO_COLLECTION: todo
      FLASK_ENV: development
      PORT: 5000
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: todo-mongodb
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
